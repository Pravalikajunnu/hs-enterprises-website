openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: reviews
    description: Customer reviews
  - name: leads
    description: Customer leads from contact form
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /reviews:
    get:
      operationId: getReviews
      tags: [reviews]
      summary: Get all reviews
      responses:
        "200":
          description: List of reviews
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Review"
    post:
      operationId: createReview
      tags: [reviews]
      summary: Submit a new review
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReviewInput"
      responses:
        "201":
          description: Review created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /leads:
    get:
      operationId: getLeads
      tags: [leads]
      summary: Get all leads (admin only)
      parameters:
        - in: query
          name: pin
          required: true
          schema:
            type: string
          description: Admin PIN for access
      responses:
        "200":
          description: List of leads
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Lead"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createLead
      tags: [leads]
      summary: Submit a new lead from contact form
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLeadInput"
      responses:
        "201":
          description: Lead created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    Review:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        location:
          type: string
        service:
          type: string
        rating:
          type: integer
        text:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, name, location, service, rating, text, createdAt]
    CreateReviewInput:
      type: object
      properties:
        name:
          type: string
          minLength: 2
        location:
          type: string
          minLength: 2
        service:
          type: string
          minLength: 1
        rating:
          type: integer
          minimum: 1
          maximum: 5
        text:
          type: string
          minLength: 10
      required: [name, location, service, rating, text]
    Lead:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: string
        loanType:
          type: string
        message:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, name, phone, loanType, message, createdAt]
    CreateLeadInput:
      type: object
      properties:
        name:
          type: string
          minLength: 2
        phone:
          type: string
        loanType:
          type: string
          minLength: 1
        message:
          type: string
      required: [name, phone, loanType]
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
